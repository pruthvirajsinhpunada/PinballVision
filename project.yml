name: PinballVision
options:
  bundleIdPrefix: com.pruthvirajsinh
  deploymentTarget:
    visionOS: "2.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_PREVIEWS: YES
    TARGETED_DEVICE_FAMILY: "7"

targets:
  PinballVision:
    type: application
    platform: visionOS
    deploymentTarget: "2.0"
    sources:
      - path: PinballVision
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pruthvirajsinh.PinballVision
        INFOPLIST_FILE: PinballVision/Info.plist
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: NO
    info:
      path: PinballVision/Info.plist
      properties:
        CFBundleName: PinballVision
        CFBundleDisplayName: Pinball Vision
        CFBundleIdentifier: com.pruthvirajsinh.PinballVision
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        UILaunchScreen: {}
    entitlements:
      path: PinballVision/PinballVision.entitlements
      properties: {}
